services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: insightflow-backend:p37
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8000}:8000"
    environment:
      INSIGHTFLOW_PRODUCT_LIVE_MODE: "${INSIGHTFLOW_PRODUCT_LIVE_MODE:-0}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-pro}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      INSIGHTFLOW_CORS_ORIGINS: "${INSIGHTFLOW_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      INSIGHTFLOW_LOG_FORMAT: "${INSIGHTFLOW_LOG_FORMAT:-json}"
      INSIGHTFLOW_LOG_LEVEL: "${INSIGHTFLOW_LOG_LEVEL:-INFO}"
      INSIGHTFLOW_TRACE_SINKS: "${INSIGHTFLOW_TRACE_SINKS:-local}"
      INSIGHTFLOW_TRACE_DIR: "/app/logs/traces"
      INSIGHTFLOW_TRACE_RETENTION_DAYS: "${INSIGHTFLOW_TRACE_RETENTION_DAYS:-}"
      INSIGHTFLOW_TRACE_RETENTION_MAX_BYTES: "${INSIGHTFLOW_TRACE_RETENTION_MAX_BYTES:-}"
    volumes:
      - workspace-data:/app/workspaces
      - report-data:/app/reports
      - trace-data:/app/logs/traces
    networks:
      - insightflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-http://localhost:8000}"
    image: insightflow-frontend:p37
    init: true
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          require('http').get('http://127.0.0.1:3000/', response => {
            response.resume();
            process.exit(response.statusCode >= 200 && response.statusCode < 400 ? 0 : 1);
          }).on('error', () => process.exit(1));
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - insightflow-network

  prometheus:
    image: prom/prometheus:v3.5.0
    profiles: ["observability"]
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - type: bind
        source: ./observability/prometheus/prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - type: bind
        source: ./observability/alerts
        target: /etc/prometheus/rules
        read_only: true
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://127.0.0.1:9090/-/healthy && wget --spider --quiet http://127.0.0.1:9090/-/ready"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    networks:
      - insightflow-network

  grafana:
    image: grafana/grafana:12.1.0
    profiles: ["observability"]
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        if [ -z "$${GF_SECURITY_ADMIN_PASSWORD:-}" ]; then
          echo "Grafana startup refused: set GRAFANA_ADMIN_PASSWORD in local .env or a deployment secret." >&2
          exit 64
        fi
        exec /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    volumes:
      - type: bind
        source: ./observability/grafana/provisioning
        target: /etc/grafana/provisioning
        read_only: true
      - type: bind
        source: ./observability/grafana/dashboards
        target: /var/lib/grafana/dashboards-repository
        read_only: true
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 6
    mem_limit: 384m
    cpus: 1.0
    networks:
      - insightflow-network

networks:
  insightflow-network:
    driver: bridge

volumes:
  workspace-data:
  report-data:
  trace-data:
  prometheus-data:
    name: "${COMPOSE_PROJECT_NAME:-insightflow}_prometheus-data"
  grafana-data:
    name: "${COMPOSE_PROJECT_NAME:-insightflow}_grafana-data"
