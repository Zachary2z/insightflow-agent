apiVersion: 1

providers:
  - name: InsightFlow Repository Dashboards
    orgId: 1
    folder: InsightFlow Observability
    folderUid: insightflow-observability
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards-repository
      foldersFromFilesStructure: false
