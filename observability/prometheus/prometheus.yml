global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: insightflow-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
