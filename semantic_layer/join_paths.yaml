  metrics:
    - "stockout_rate"
  dimensions:
    - "product"
    - "category"
    - "time"
  entities:
    - "inventory"
    - "product"
    - "category"
  purpose: "Analyze inventory and stockout risk by product or category."

product_reviews_to_products:
