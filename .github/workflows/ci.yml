name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend development dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run backend tests
        run: python -m pytest
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: npm test
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Validate Compose configuration
        run: docker compose --env-file /dev/null config -q
      - name: Check Docker Smoke script syntax
        run: bash -n scripts/docker_smoke_test.sh
      - name: Run no-key Docker Smoke acceptance
        run: scripts/docker_smoke_test.sh
